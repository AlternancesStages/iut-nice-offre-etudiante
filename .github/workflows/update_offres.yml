name: Mise a jour des offres etudiantes

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: update-student-offers-main
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  legal-sources:
    name: Sources legales (${{ matrix.nom }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - group: france-travail
            sources: France Travail API
            nom: API France Travail
          - group: la-bonne-alternance
            sources: La Bonne Alternance
            nom: La Bonne Alternance
          - group: pass-fonction-publique
            sources: PASS Fonction publique
            nom: PASS Fonction publique
          - group: cea
            sources: CEA Emploi RSS
            nom: Flux RSS CEA Emploi

    env:
      FRANCE_TRAVAIL_CLIENT_ID: ${{ secrets.FRANCE_TRAVAIL_CLIENT_ID }}
      FRANCE_TRAVAIL_CLIENT_SECRET: ${{ secrets.FRANCE_TRAVAIL_CLIENT_SECRET }}
      LBA_API_TOKEN: ${{ secrets.LBA_API_TOKEN }}
      LEGAL_JOB_SOURCES: ${{ matrix.sources }}
      LEGAL_JOB_SAVE_ONLY_ENABLED: "1"
      GOOGLE_CREDENTIALS_B64: ${{ secrets.GOOGLE_CREDENTIALS_B64 }}
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      USE_GOOGLE_FORMATION_CONFIG: "1"

    steps:
      - name: Recuperer le code du depot
        uses: actions/checkout@v4

      - name: Mettre en cache le fichier de geocodage
        uses: actions/cache@v4
        with:
          path: exports/geocoding_cache.json
          key: geocoding-cache-${{ github.run_id }}
          restore-keys: |
            geocoding-cache-

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Mettre en cache les modeles Hugging Face
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-models-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-hf-models-

      - name: Installer les dependances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collecter les sources legales
        run: python -u -m src.scrapers.legal_sources_all

      - name: Televerser les exports des sources legales
        uses: actions/upload-artifact@v4
        with:
          name: legal-source-exports-${{ matrix.group }}
          path: exports/*.xlsx

  jobhive:
    name: Collecte JobHive
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GOOGLE_CREDENTIALS_B64: ${{ secrets.GOOGLE_CREDENTIALS_B64 }}
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}

    steps:
      - name: Recuperer le code du depot
        uses: actions/checkout@v4

      - name: Mettre en cache le fichier de geocodage
        uses: actions/cache@v4
        with:
          path: exports/geocoding_cache.json
          key: geocoding-cache-${{ github.run_id }}
          restore-keys: |
            geocoding-cache-

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Mettre en cache les modeles Hugging Face
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-models-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-hf-models-

      - name: Installer les dependances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collecter les offres JobHive
        run: python -u -m src.scrapers.jobhive_source

      - name: Televerser les exports JobHive
        uses: actions/upload-artifact@v4
        with:
          name: jobhive-exports
          path: exports/*.xlsx

  fusion-export:
    name: Fusion et Exportation
    runs-on: ubuntu-latest

    needs:
      - legal-sources
      - jobhive

    env:
      GOOGLE_CREDENTIALS_B64: ${{ secrets.GOOGLE_CREDENTIALS_B64 }}

    steps:
      - name: Recuperer le code du depot
        uses: actions/checkout@v4

      - name: Telecharger les exports des sources legales
        uses: actions/download-artifact@v4
        with:
          pattern: legal-source-exports-*
          path: temp/legal_sources

      - name: Telecharger les exports JobHive
        uses: actions/download-artifact@v4
        with:
          name: jobhive-exports
          path: temp/jobhive

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Mettre en cache les modeles Hugging Face
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-models-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-hf-models-

      - name: Installer les dependances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fusionner les exports des sources
        run: python -u -m src.pipeline.merge_artifacts

      - name: Fusionner par departements
        run: python -u -m src.pipeline.fusion_departements

      - name: Exporter vers Google Sheets
        run: python -u -m src.pipeline.export
