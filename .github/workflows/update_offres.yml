name: Update student offers

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"


concurrency:
  group: update-student-offers-main
  cancel-in-progress: true

jobs:
  legal-sources:
    name: legal-sources (${{ matrix.group }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - group: france-travail
            sources: France Travail API
          - group: la-bonne-alternance
            sources: La Bonne Alternance
          - group: pass-fonction-publique
            sources: PASS Fonction publique
          - group: cea
            sources: CEA Emploi RSS

    env:
      FRANCE_TRAVAIL_CLIENT_ID: ${{ secrets.FRANCE_TRAVAIL_CLIENT_ID }}
      FRANCE_TRAVAIL_CLIENT_SECRET: ${{ secrets.FRANCE_TRAVAIL_CLIENT_SECRET }}
      LBA_API_TOKEN: ${{ secrets.LBA_API_TOKEN }}
      LEGAL_JOB_SOURCES: ${{ matrix.sources }}
      LEGAL_JOB_SAVE_ONLY_ENABLED: "1"
      GOOGLE_CREDENTIALS_B64: ${{ secrets.GOOGLE_CREDENTIALS_B64 }}
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      USE_GOOGLE_FORMATION_CONFIG: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-models-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-hf-models-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect legal sources
        run: python -u -m src.scrapers.legal_sources_all

      - name: Upload legal source exports
        uses: actions/upload-artifact@v4
        with:
          name: legal-source-exports-${{ matrix.group }}
          path: exports/*.xlsx

  jobhive:
    name: jobhive
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GOOGLE_CREDENTIALS_B64: ${{ secrets.GOOGLE_CREDENTIALS_B64 }}
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-models-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-hf-models-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect JobHive offers
        run: python -u -m src.scrapers.jobhive_source

      - name: Upload JobHive exports
        uses: actions/upload-artifact@v4
        with:
          name: jobhive-exports
          path: exports/*.xlsx

  fusion-export:
    runs-on: ubuntu-latest

    needs:
      - legal-sources
      - jobhive

    env:
      GOOGLE_CREDENTIALS_B64: ${{ secrets.GOOGLE_CREDENTIALS_B64 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download legal source exports
        uses: actions/download-artifact@v4
        with:
          pattern: legal-source-exports-*
          path: temp/legal_sources

      - name: Download JobHive exports
        uses: actions/download-artifact@v4
        with:
          name: jobhive-exports
          path: temp/jobhive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-models-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-hf-models-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Merge source exports
        run: python -u -m src.pipeline.merge_artifacts

      - name: Fusion departments
        run: python -u -m src.pipeline.fusion_departements

      - name: Export to Google Sheets
        run: python -u -m src.pipeline.export
